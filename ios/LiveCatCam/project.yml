name: LiveCatCam
options:
  bundleIdPrefix: com.livecat
  deploymentTarget:
    iOS: "18.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: false
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MACCATALYST: false

targets:
  LiveCatCam:
    type: application
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: Sources/LiveCatCam
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.livecat.cam
        INFOPLIST_FILE: SupportFiles/Info.plist
        CODE_SIGN_ENTITLEMENTS: SupportFiles/LiveCatCam.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
    resources:
      - path: Resources
        optional: true
      - path: SupportFiles/Assets.xcassets
    entitlements:
      path: SupportFiles/LiveCatCam.entitlements
